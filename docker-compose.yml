services:
  postgres:
    image: postgres:15
    container_name: bodego-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bodego
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - bodego-net
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  bodego:
    build: .
    depends_on:
      - postgres
      - redis
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=bodego
      - DB_SSLMODE=disable
      - REDIS_ADDR=redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - PRODUCT_SERVICE_URL=http://product-service:8080
      - PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    networks:
      - bodego-net
volumes:
  pgdata:

networks:
  bodego-net:
